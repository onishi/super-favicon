name: SuperFaviconBrowser
options:
  bundleIdPrefix: com.superfavicon
  deploymentTarget:
    iOS: "17.0"
targets:
  SuperFaviconBrowser:
    type: application
    platform: iOS
    sources:
      - SuperFaviconBrowser
    info:
      path: SuperFaviconBrowser/Info.plist
      properties:
        CFBundleDisplayName: FaviconExplorer
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        # iPad マルチタスキング対応には iPad で4方向すべての指定が必須
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          # ブラウザとして http のサイトも開けるようにする
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.superfavicon
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "1"
