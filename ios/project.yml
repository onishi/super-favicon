name: SuperFaviconBrowser
options:
  bundleIdPrefix: com.superfavicon
  deploymentTarget:
    iOS: "17.0"
targets:
  SuperFaviconBrowser:
    type: application
    platform: iOS
    sources:
      - SuperFaviconBrowser
    info:
      path: SuperFaviconBrowser/Info.plist
      properties:
        CFBundleDisplayName: SuperFavicon
        UILaunchScreen: {}
        NSAppTransportSecurity:
          # ブラウザとして http のサイトも開けるようにする
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.superfavicon
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
